<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes shoot { 0% { transform: translateY(400px); } 100% { transform: translateY(-50px); } }
      @keyframes ship { 0%, 100% { transform: translateX(350px); } 50% { transform: translateX(400px); } }
      .bullet { animation: shoot 1.5s infinite; }
      .ship { animation: ship 3s infinite; }
      .enemy { opacity: 0.8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(102, 126, 234, 0.1)" stroke-width="1">
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="0" x2="0" y2="400"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
  </g>

  <!-- Player Ship -->
  <g class="ship">
    <circle cx="375" cy="370" r="12" fill="#667eea" opacity="0.9"/>
    <polygon points="375,355 365,370 385,370" fill="#667eea"/>
    <circle cx="375" cy="370" r="15" fill="none" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Enemy Ships -->
  <g class="enemy">
    <circle cx="100" cy="60" r="10" fill="#FF6B6B"/>
    <polygon points="100,50 92,65 108,65" fill="#FF6B6B"/>
  </g>
  <g class="enemy">
    <circle cx="300" cy="40" r="10" fill="#4ECDC4"/>
    <polygon points="300,30 292,45 308,45" fill="#4ECDC4"/>
  </g>
  <g class="enemy">
    <circle cx="600" cy="80" r="10" fill="#FFA07A"/>
    <polygon points="600,70 592,85 608,85" fill="#FFA07A"/>
  </g>

  <!-- Bullets -->
  <circle class="bullet" cx="375" cy="350" r="3" fill="#FFD700"/>
  <circle class="bullet" cx="350" cy="330" r="3" fill="#FFD700" style="animation-delay: 0.5s;"/>
  <circle class="bullet" cx="400" cy="310" r="3" fill="#FFD700" style="animation-delay: 1s;"/>

  <!-- Score Display -->
  <text x="20" y="30" font-size="18" font-weight="bold" fill="#667eea" font-family="Arial">
    🚀 Space Shooter Game
  </text>
  <text x="20" y="380" font-size="12" fill="#764ba2" font-family="Arial">
    Your GitHub contributions = Game Speed | Shoot the code blocks!
  </text>
  <text x="600" y="30" font-size="14" fill="#4ECDC4" font-family="Arial">
    Updated: Now
  </text>
</svg>